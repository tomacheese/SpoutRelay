name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  pull_request_target:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - closed
  merge_group:
  workflow_dispatch:

# pull_request と pull_request_target が同一グループになると互いをキャンセルしてしまうため
# event_name を含めることで両イベントのキャンセルを独立させる
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  calc-version:
    name: 🔢 Calculate next version
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    permissions:
      contents: write

    outputs:
      tag: ${{ steps.tag-version.outputs.new_tag }}
      changelog: ${{ steps.tag-version.outputs.changelog }}

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          # マージ済みの場合は base ブランチ (master)、未マージの場合は PR ヘッド SHA を使う
          ref: ${{ github.event.pull_request.merged == true && github.base_ref || github.event.pull_request.head.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷 Bump version and push tag
        id: tag-version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: "minor"
          custom_release_rules: "feat:minor:✨ Features,fix:patch:🐛 Fixes,docs:patch:📰 Docs,chore:patch:🎨 Chore,pref:patch:🎈 Performance improvements,refactor:patch:🧹 Refactoring,build:patch:🔍 Build,ci:patch:🔍 CI,revert:patch:⏪ Revert,style:patch:🧹 Style,test:patch:👀 Test,release:major:📦 Release"
          # マージ済みの場合のみ実際にタグを作成する（PR 中はドライラン）
          dry_run: ${{ github.event.pull_request.merged == true && 'false' || 'true' }}

  cpp-build:
    name: 🏗️ Build & Test (Windows / MinGW64)
    runs-on: windows-latest
    needs:
      - calc-version
    # calc-version はスキップされることがある（push/pull_request/workflow_dispatch イベント）ため
    # skipped も成功扱いにする。また closed で未マージの PR はビルドをスキップする
    if: >-
      always() &&
      (needs.calc-version.result == 'success' || needs.calc-version.result == 'skipped') &&
      (github.event.action != 'closed' || github.event.pull_request.merged == true)
    permissions:
      contents: write

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
          # pull_request_target: マージ済みなら base ブランチ、未マージなら PR ヘッド SHA
          # それ以外 (push/pull_request/workflow_dispatch): github.sha
          ref: "${{ github.event.pull_request.merged == true && github.base_ref || github.event.pull_request.head.sha || github.sha }}"

      - name: 🏗 Setup MSYS2 / MinGW64
        uses: msys2/setup-msys2@cafece8e6baf9247cf9b1bf95097b0b983cc558d # v2.31.0
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkg-config

      - name: 📥 Download FFmpeg LGPL shared build
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/latest/download/ffmpeg-master-latest-win64-lgpl-shared.zip"
          $zip = "$env:TEMP\ffmpeg-lgpl.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath "$env:TEMP\ffmpeg-lgpl" -Force
          $inner = (Get-ChildItem "$env:TEMP\ffmpeg-lgpl" | Select-Object -First 1).FullName
          New-Item -ItemType Directory -Force deps\ffmpeg | Out-Null
          Copy-Item "$inner\*" deps\ffmpeg -Recurse -Force
          Write-Host "FFmpeg LGPL: $((& deps\ffmpeg\bin\ffmpeg.exe -version 2>&1)[0])"

      - name: 🔧 Configure CMake
        shell: msys2 {0}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=toolchain-mingw.cmake \
            -DBUILD_TESTS=ON
        env:
          MINGW_BIN: /mingw64/bin
          MINGW_ROOT: /mingw64/x86_64-w64-mingw32

      - name: 🏗️ Build
        shell: msys2 {0}
        run: cmake --build build --parallel

      - name: 🧪 Run unit tests
        shell: msys2 {0}
        run: ./build/tests/publisher_tests.exe

      - name: 📦 Package binary
        shell: msys2 {0}
        run: |
          mkdir -p dist
          cp build/spout-relay.exe dist/
          strip dist/spout-relay.exe
          # Bundle FFmpeg LGPL DLLs (only the 7 core FFmpeg DLLs — no GPL codecs)
          cp deps/ffmpeg/bin/*.dll dist/
          echo "Packaged $(ls dist/ | wc -l) files (EXE + FFmpeg LGPL DLLs)"

      - name: 📦 Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: spout-relay-win64
          path: dist/

      - name: 📦 Package release archive
        id: package
        if: github.event.pull_request.merged == true
        shell: pwsh
        run: |
          $VERSION = "${{ needs.calc-version.outputs.tag }}"
          $ARCHIVE = "spout-relay-${VERSION}-win64.zip"
          # dist/ は前のステップで strip 済み EXE と DLL が入っている
          if (Test-Path config\config.example.json) { Copy-Item config\config.example.json dist\ }
          if (Test-Path README.md) { Copy-Item README.md dist\ }
          Compress-Archive -Path dist\* -DestinationPath $ARCHIVE -Force
          "archive=$ARCHIVE" >> $env:GITHUB_OUTPUT
          $count = (Get-ChildItem dist).Count
          Write-Host "Packaged $count files into $ARCHIVE"

      - name: 🎉 Create GitHub Release
        if: github.event.pull_request.merged == true
        uses: ncipollo/release-action@v1.21.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: ${{ needs.calc-version.outputs.tag }}
          name: ${{ needs.calc-version.outputs.tag }}
          body: ${{ needs.calc-version.outputs.changelog }}
          artifacts: ${{ steps.package.outputs.archive }}
          draft: false
          prerelease: false

  finished-ci:
    name: ✅ CI
    runs-on: ubuntu-latest
    if: always()
    needs:
      - calc-version
      - cpp-build

    steps:
      - name: 🔍 Check build status
        run: |
          calc_result="${{ needs.calc-version.result }}"
          build_result="${{ needs.cpp-build.result }}"
          echo "calc-version: $calc_result"
          echo "cpp-build: $build_result"
          if [ "$calc_result" != "success" ] && [ "$calc_result" != "skipped" ]; then
            echo "Version calculation failed"
            exit 1
          fi
          if [ "$build_result" != "success" ] && [ "$build_result" != "skipped" ]; then
            echo "Build/test failed"
            exit 1
          fi

