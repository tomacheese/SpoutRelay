name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cpp-build:
    name: 🏗️ Build & Test (Windows / MinGW64)
    runs-on: windows-latest

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive

      - name: 🏗 Setup MSYS2 / MinGW64
        uses: msys2/setup-msys2@cafece8e6baf9247cf9b1bf95097b0b983cc558d # v2.31.0
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-ffmpeg

      - name: 🔧 Configure CMake
        shell: msys2 {0}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=toolchain-mingw.cmake \
            -DBUILD_TESTS=ON
        env:
          MINGW_BIN: /mingw64/bin
          MINGW_ROOT: /mingw64/x86_64-w64-mingw32

      - name: 🏗️ Build
        shell: msys2 {0}
        run: cmake --build build --parallel

      - name: 🧪 Run unit tests
        shell: msys2 {0}
        run: ./build/tests/publisher_tests.exe

      - name: 📦 Package binary
        shell: msys2 {0}
        run: |
          mkdir -p dist
          cp build/publisher-agent.exe dist/
          strip dist/publisher-agent.exe
          # Collect all transitive FFmpeg/codec DLLs from /mingw64/bin
          # (C++ runtime DLLs are embedded via -static-libgcc/-static-libstdc++)
          ldd build/publisher-agent.exe \
            | grep '/mingw64' \
            | awk '{print $3}' \
            | xargs -I{} cp {} dist/
          echo "Packaged $(ls dist/ | wc -l) files"

      - name: 📦 Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: publisher-agent-win64
          path: dist/

  finished-ci:
    name: ✅ CI
    runs-on: ubuntu-latest
    if: always()
    needs:
      - cpp-build

    steps:
      - name: 🔍 Check build status
        run: |
          result="${{ needs.cpp-build.result }}"
          echo "cpp-build: $result"
          if [ "$result" != "success" ]; then
            echo "CI failed"
            exit 1
          fi

