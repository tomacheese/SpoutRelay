name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    name: 🚀 Version & Release
    runs-on: windows-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: 🛎 Checkout (full history)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
          # Always check out the exact commit that passed CI, not HEAD of master.
          # workflow_run uses default branch by default, so we must pin the SHA explicitly.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: 🏷 Determine next version
        id: version
        shell: bash
        run: |
          # Get latest semver tag; default to v0.0.0
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          LATEST=${LATEST:-v0.0.0}
          echo "Latest tag: $LATEST"

          MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d v)
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)

          # Collect commits since last tag
          if [ "$LATEST" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" "${LATEST}..HEAD")
          fi

          echo "Commits since $LATEST:"
          echo "$COMMITS"

          if [ -z "$COMMITS" ]; then
            echo "No new commits since last release. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP=patch
          while IFS= read -r msg; do
            if echo "$msg" | grep -qE '!:|BREAKING CHANGE'; then
              BUMP=major; break
            elif echo "$msg" | grep -qE '^feat(\(.*\))?:'; then
              BUMP=minor
            fi
          done <<< "$COMMITS"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_TAG (bump: $BUMP)"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

          # Build release notes from commits
          NOTES=""
          while IFS= read -r msg; do
            NOTES="${NOTES}- ${msg}"$'\n'
          done <<< "$COMMITS"
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: 🏗 Setup MSYS2 / MinGW64
        if: steps.version.outputs.skip == 'false'
        uses: msys2/setup-msys2@cafece8e6baf9247cf9b1bf95097b0b983cc558d # v2.31.0
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkg-config

      - name: 📥 Download FFmpeg LGPL shared build
        if: steps.version.outputs.skip == 'false'
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/latest/download/ffmpeg-master-latest-win64-lgpl-shared.zip"
          $zip = "$env:TEMP\ffmpeg-lgpl.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath "$env:TEMP\ffmpeg-lgpl" -Force
          $inner = (Get-ChildItem "$env:TEMP\ffmpeg-lgpl" | Select-Object -First 1).FullName
          New-Item -ItemType Directory -Force deps\ffmpeg | Out-Null
          Copy-Item "$inner\*" deps\ffmpeg -Recurse -Force
          Write-Host "FFmpeg LGPL: $((& deps\ffmpeg\bin\ffmpeg.exe -version 2>&1)[0])"

      - name: 🔧 Configure CMake (Release)
        if: steps.version.outputs.skip == 'false'
        shell: msys2 {0}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=toolchain-mingw.cmake \
            -DBUILD_TESTS=OFF
        env:
          MINGW_BIN: /mingw64/bin
          MINGW_ROOT: /mingw64/x86_64-w64-mingw32

      - name: 🏗️ Build release binary
        if: steps.version.outputs.skip == 'false'
        shell: msys2 {0}
        run: cmake --build build --parallel

      - name: 📦 Package release archive
        if: steps.version.outputs.skip == 'false'
        id: package
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.new_tag }}"
          $ARCHIVE = "spout-rtsp-publisher-${VERSION}-win64.zip"
          New-Item -ItemType Directory -Force dist | Out-Null

          Copy-Item build\publisher-agent.exe dist\

          # Bundle FFmpeg LGPL DLLs
          Copy-Item deps\ffmpeg\bin\*.dll dist\

          if (Test-Path config\config.example.json) { Copy-Item config\config.example.json dist\ }
          if (Test-Path README.md) { Copy-Item README.md dist\ }

          # Create zip using PowerShell (7z is not available on GitHub-hosted runners)
          Compress-Archive -Path dist\* -DestinationPath $ARCHIVE -Force

          "archive=$ARCHIVE" >> $env:GITHUB_OUTPUT
          $count = (Get-ChildItem dist).Count
          Write-Host "Packaged $count files into $ARCHIVE"

      - name: 🏷 Create git tag
        if: steps.version.outputs.skip == 'false'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"

      - name: 🎉 Create GitHub Release
        if: steps.version.outputs.skip == 'false'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: ${{ steps.version.outputs.new_tag }}
          body: |
            ## Changes

            ${{ steps.version.outputs.notes }}

            ---
            *Built with MinGW64 GCC on windows-latest. Requires Windows 10/11 x64.*
          files: ${{ steps.package.outputs.archive }}
          draft: false
          prerelease: false
